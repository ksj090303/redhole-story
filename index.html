<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embedded Video</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
      }

      iframe {
        max-width: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe
      width="1415"
      height="796"
      src="https://www.youtube.com/embed/XeL7m2NilmY"
      title="일상 컨트리볼 1화 채널 주인장 특징 Daily Life countryballs (Q&amp;A 질문 받습니다!)"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
